<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAYE Dashboard | Financial Management System</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://ik.imagekit.io/73qho7kh9/file_000000003e9471f88734aae4d52e7513%20(1).png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            transition: background 0.3s ease;
        }
        
        body.light-mode {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
        }
        
        /* Sidebar Premium */
        .sidebar-premium {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(79, 70, 229, 0.2);
            box-shadow: 4px 0 25px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        body.light-mode .sidebar-premium {
            background: rgba(255, 255, 255, 0.95);
        }
        
        .sidebar {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sidebar-collapsed { width: 88px; }
        .sidebar-expanded { width: 290px; }
        
        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            margin: 6px 12px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            cursor: pointer;
            color: #94a3b8;
        }
        
        body.light-mode .sidebar-nav-item { color: #475569; }
        
        .sidebar-nav-item i { width: 24px; font-size: 1.2rem; }
        
        .sidebar-nav-item:hover {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.15), rgba(79, 70, 229, 0.05));
            color: #e2e8f0;
            transform: translateX(5px);
        }
        
        .sidebar-nav-item.active {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.25), rgba(79, 70, 229, 0.1));
            color: #818cf8;
            border-left: 3px solid #4F46E5;
        }
        
        .sidebar-nav-item.admin-link {
            border-top: 1px solid rgba(79, 70, 229, 0.2);
            margin-top: 8px;
            padding-top: 12px;
        }
        
        .sidebar-nav-item.admin-link i {
            color: #F59E0B;
        }
        
        .topbar-premium {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(79, 70, 229, 0.2);
            transition: all 0.3s ease;
        }
        
        body.light-mode .topbar-premium {
            background: rgba(255, 255, 255, 0.85);
        }
        
        .search-input {
            background: rgba(51, 65, 85, 0.6);
            border: 1px solid rgba(79, 70, 229, 0.3);
            border-radius: 60px;
            transition: all 0.25s ease;
        }
        
        .user-btn {
            background: rgba(51, 65, 85, 0.6);
            border: 1px solid rgba(79, 70, 229, 0.3);
            border-radius: 60px;
            transition: all 0.25s ease;
        }
        
        .user-btn:hover {
            border-color: #4F46E5;
            background: rgba(79, 70, 229, 0.15);
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 70, 229, 0.2);
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        
        body.light-mode .glass-card {
            background: rgba(255, 255, 255, 0.7);
        }
        
        .glass-card:hover {
            border-color: rgba(79, 70, 229, 0.5);
        }
        
        .kpi-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(30, 41, 59, 0.7));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 70, 229, 0.25);
            border-radius: 28px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .kpi-card:hover {
            transform: translateY(-4px);
            border-color: #4F46E5;
        }
        
        .kpi-value {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Light mode number visibility */
        body.light-mode .kpi-value {
            background: linear-gradient(135deg, #1e293b, #4F46E5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .chart-container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(79, 70, 229, 0.2);
            border-radius: 24px;
            padding: 1.25rem;
        }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(79, 70, 229, 0.4);
            padding: 0.9rem 1.5rem;
            border-radius: 60px;
            z-index: 3000;
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
        }
        
        .toast.success { background: rgba(34, 197, 94, 0.9); }
        .toast.error { background: rgba(239, 68, 68, 0.9); }
        .toast.info { background: rgba(59, 130, 246, 0.9); }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        
        .spinner-premium {
            width: 55px;
            height: 55px;
            border: 3px solid rgba(79, 70, 229, 0.2);
            border-top-color: #4F46E5;
            border-right-color: #818cf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .activity-item {
            background: rgba(51, 65, 85, 0.3);
            border-radius: 16px;
            padding: 12px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        
        .activity-item:hover {
            border-color: rgba(79, 70, 229, 0.4);
            background: rgba(79, 70, 229, 0.08);
        }
        
        .repayment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(51, 65, 85, 0.3);
            border-radius: 16px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            cursor: pointer;
        }
        
        .repayment-item:hover {
            background: rgba(79, 70, 229, 0.1);
            border-color: rgba(79, 70, 229, 0.3);
            transform: translateX(4px);
        }
        
        .floating-btn {
            background: linear-gradient(135deg, #4F46E5, #6366f1);
            box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.5);
            transition: all 0.25s ease;
        }
        
        .floating-btn:hover {
            transform: scale(1.1);
        }
        
        .health-meter {
            height: 8px;
            background: rgba(51, 65, 85, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s infinite;
            border-radius: 20px;
        }
        
        @keyframes skeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .page-animation {
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .mobile-menu-premium {
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(79, 70, 229, 0.3);
        }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #4F46E5; border-radius: 10px; }
        
        body.light-mode .text-slate-200 { color: #1e293b; }
        body.light-mode .text-slate-300 { color: #334155; }
        body.light-mode .text-slate-400 { color: #64748b; }
        body.light-mode .border-slate-700 { border-color: #e2e8f0; }
        body.light-mode .bg-slate-800 { background-color: #f1f5f9; }
        body.light-mode .bg-slate-800\/50 { background-color: #f8fafc; }
        body.light-mode .bg-slate-900 { background-color: #ffffff; }
        
        .modal-premium {
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(79, 70, 229, 0.3);
            border-radius: 32px;
        }
        
        body.light-mode .modal-premium {
            background: rgba(255, 255, 255, 0.98);
        }
        
        /* Positive amount styling */
        .amount-positive {
            color: #22C55E;
        }
        
        body.light-mode .amount-positive {
            color: #15803D;
        }
        
        .amount-negative {
            color: #EF4444;
        }
        
        body.light-mode .amount-negative {
            color: #DC2626;
        }
        
        @media (max-width: 768px) {
            .kpi-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner-premium"></div>
    </div>
    
    <!-- Mobile Menu Overlay -->
    <div id="mobileMenuOverlay" class="fixed inset-0 bg-black/60 z-35 hidden backdrop-blur-sm" onclick="closeMobileMenu()"></div>
    
    <!-- Mobile Sidebar -->
    <div id="mobileSidebar" class="mobile-menu-premium fixed top-0 left-0 h-full w-72 z-40 transform -translate-x-full transition-transform duration-300 ease-out">
        <div class="p-6 border-b border-indigo-500/20">
            <div class="flex items-center gap-3">
                <img src="https://ik.imagekit.io/73qho7kh9/file_000000003e9471f88734aae4d52e7513%20(1).png" alt="Logo" class="h-11 w-auto">
                <div>
                    <span class="font-extrabold text-xl tracking-tight bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">MAYE</span>
                    <span class="font-semibold text-xs text-slate-400">Financial System</span>
                </div>
            </div>
        </div>
        <div id="mobileSidebarNav" class="p-4 space-y-1.5"></div>
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-indigo-500/20">
            <button id="logoutBtnMobile" class="sidebar-nav-item w-full !text-red-400 hover:!bg-red-500/10">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </div>
    
    <!-- Main Container -->
    <div class="flex h-screen overflow-hidden">
        <!-- Desktop Sidebar -->
        <aside id="desktopSidebar" class="sidebar sidebar-expanded sidebar-premium flex flex-col h-screen fixed left-0 top-0 z-30 hidden md:flex">
            <div class="px-5 pt-6 pb-5 border-b border-indigo-500/20 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <img src="https://ik.imagekit.io/73qho7kh9/file_000000003e9471f88734aae4d52e7513%20(1).png" alt="Logo" class="h-7 w-auto">
                    </div>
                    <div id="sidebarLogoArea">
                        <span class="font-extrabold text-xl tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-indigo-400 bg-clip-text text-transparent">MAYE</span>
                        <span class="font-bold text-xs text-slate-400 block">Dashboard</span>
                    </div>
                </div>
                <button id="toggleSidebarBtn" class="text-slate-400 hover:text-indigo-400 transition-all p-1.5 rounded-lg hover:bg-indigo-500/10">
                    <i class="fas fa-chevron-left text-sm"></i>
                </button>
            </div>
            <nav id="sidebarNav" class="flex-1 py-5 space-y-1.5"></nav>
            <div class="p-4 border-t border-indigo-500/20 mt-auto">
                <div class="sidebar-nav-item admin-link text-amber-400 hover:bg-amber-500/10" onclick="window.location.href='administration.html'">
                    <i class="fas fa-user-shield w-5"></i>
                    <span class="nav-text font-semibold">Admin Panel</span>
                </div>
                <button id="logoutBtnSidebar" class="sidebar-nav-item w-full !text-red-400 hover:!bg-red-500/10 mt-2">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="nav-text font-semibold">Logout</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden md:ml-[290px] transition-all duration-300 ease-out" id="mainContent">
            <!-- Topbar -->
            <header class="topbar-premium sticky top-0 z-20">
                <div class="px-5 sm:px-7 py-3.5 flex items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <button id="mobileMenuBtn" class="md:hidden text-slate-300 hover:text-white text-2xl p-1.5 rounded-xl hover:bg-indigo-500/10 transition">
                            <i class="fas fa-bars"></i>
                        </button>
                        <div class="hidden md:flex items-center search-input px-4 py-2.5 min-w-[320px]">
                            <i class="fas fa-search text-slate-400 mr-3"></i>
                            <input type="text" id="globalSearch" placeholder="Search... (Ctrl+K)" class="bg-transparent outline-none text-sm flex-1 text-slate-200 font-medium">
                            <kbd class="hidden sm:inline-block text-xs text-slate-400 bg-slate-800 px-2 py-1 rounded-lg font-mono">Ctrl+K</kbd>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <button id="themeToggle" class="user-btn !rounded-full !w-10 !h-10 flex items-center justify-center text-slate-300 hover:text-indigo-400 transition">
                            <i class="fas fa-moon text-lg"></i>
                        </button>
                        
                        <div class="relative">
                            <button id="userMenuBtn" class="user-btn flex items-center gap-2 px-3 py-2">
                                <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-full flex items-center justify-center">
                                    <img id="userAvatar" src="" class="w-8 h-8 rounded-full object-cover hidden">
                                    <i id="userAvatarFallback" class="fas fa-user text-white text-sm"></i>
                                </div>
                                <div class="hidden lg:block text-left">
                                    <p id="userName" class="text-sm font-bold text-slate-200">Loading...</p>
                                    <p class="text-xs text-slate-400">User</p>
                                </div>
                                <i class="fas fa-chevron-down text-xs text-slate-400 hidden lg:inline"></i>
                            </button>
                            <div id="userDropdown" class="dropdown-premium absolute top-full right-0 mt-2 w-72 rounded-2xl hidden z-50 overflow-hidden">
                                <div class="p-4 border-b border-indigo-500/20">
                                    <p id="userEmailDisplay" class="text-sm font-medium text-slate-300 truncate">user@example.com</p>
                                </div>
                                <div class="py-2">
                                    <div class="flex items-center gap-3 px-4 py-3 hover:bg-indigo-500/10 transition cursor-pointer font-medium" onclick="window.location.href='income.html'">
                                        <i class="fas fa-money-bill-wave w-5 text-emerald-400"></i> Income
                                    </div>
                                    <div class="flex items-center gap-3 px-4 py-3 hover:bg-indigo-500/10 transition cursor-pointer font-medium" onclick="window.location.href='procurement.html'">
                                        <i class="fas fa-shopping-cart w-5 text-amber-400"></i> Procurement
                                    </div>
                                    <div class="flex items-center gap-3 px-4 py-3 hover:bg-indigo-500/10 transition cursor-pointer font-medium" onclick="window.location.href='reports.html'">
                                        <i class="fas fa-chart-pie w-5 text-purple-400"></i> Reports
                                    </div>
                                    <div class="flex items-center gap-3 px-4 py-3 hover:bg-indigo-500/10 transition cursor-pointer font-medium" onclick="window.location.href='debts.html'">
                                        <i class="fas fa-hand-holding-usd w-5 text-cyan-400"></i> Debts
                                    </div>
                                    <div class="flex items-center gap-3 px-4 py-3 hover:bg-indigo-500/10 transition cursor-pointer font-medium" onclick="window.location.href='settings.html'">
                                        <i class="fas fa-cog w-5 text-indigo-400"></i> Settings
                                    </div>
                                    <div class="flex items-center gap-3 px-4 py-3 hover:bg-indigo-500/10 transition cursor-pointer font-medium" onclick="window.location.href='administration.html'">
                                        <i class="fas fa-user-shield w-5 text-amber-400"></i> Admin Panel
                                    </div>
                                    <hr class="border-indigo-500/20 my-1">
                                    <button id="logoutBtnTopbar" class="w-full flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-500/10 transition font-medium">
                                        <i class="fas fa-sign-out-alt w-5"></i> Logout
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="md:hidden px-5 pb-4">
                    <div class="search-input flex items-center px-4 py-2.5">
                        <i class="fas fa-search text-slate-400 mr-3"></i>
                        <input type="text" id="mobileSearch" placeholder="Search..." class="bg-transparent outline-none text-sm flex-1 text-slate-200">
                    </div>
                </div>
            </header>
            
            <!-- Breadcrumb -->
            <div class="px-5 sm:px-7 py-3 border-b border-indigo-500/10 bg-slate-900/30">
                <div class="flex items-center gap-2 text-sm font-medium">
                    <i class="fas fa-home text-indigo-400 text-xs"></i>
                    <span class="text-slate-400">Dashboard</span>
                    <i class="fas fa-chevron-right text-xs text-slate-600"></i>
                    <span class="text-slate-200 font-semibold">Overview</span>
                </div>
            </div>
            
            <!-- Page Content -->
            <main class="flex-1 overflow-y-auto p-5 sm:p-7">
                <!-- Skeleton loading -->
                <div id="skeletonLoader" class="space-y-6">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                        <div class="skeleton h-36 rounded-2xl"></div>
                        <div class="skeleton h-36 rounded-2xl"></div>
                        <div class="skeleton h-36 rounded-2xl"></div>
                        <div class="skeleton h-36 rounded-2xl"></div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="skeleton h-80 rounded-2xl"></div>
                        <div class="skeleton h-80 rounded-2xl"></div>
                    </div>
                    <div class="skeleton h-96 rounded-2xl"></div>
                </div>
                
                <!-- Actual content -->
                <div id="actualContent" class="page-animation" style="display: none;"></div>
            </main>
        </div>
    </div>
    
    <!-- Command Palette -->
    <div id="commandPalette" class="fixed top-1/4 left-1/2 -translate-x-1/2 w-[90%] max-w-xl hidden z-[10000] bg-slate-800 rounded-2xl border border-indigo-500/30 shadow-2xl">
        <div class="p-5 border-b border-slate-700">
            <div class="flex items-center gap-3">
                <i class="fas fa-search text-indigo-400 text-xl"></i>
                <input type="text" id="commandInput" placeholder="Type a command or search..." class="bg-transparent outline-none w-full text-white text-lg font-medium">
            </div>
        </div>
        <div id="commandResults" class="max-h-80 overflow-y-auto p-3 space-y-2"></div>
    </div>
    
    <!-- Add Income Modal -->
    <div id="addIncomeModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[5000] items-center justify-center hidden">
        <div class="modal-premium w-[90%] max-w-md p-6 rounded-3xl">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-2xl font-extrabold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent flex items-center gap-2">
                    <i class="fas fa-plus-circle text-indigo-400"></i> Add Income
                </h2>
                <button onclick="closeModal('addIncomeModal')" class="text-slate-400 hover:text-white p-2 rounded-xl hover:bg-slate-800 transition">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="addIncomeForm">
                <div class="mb-4">
                    <label class="block text-sm font-bold text-slate-300 mb-2">Amount *</label>
                    <input type="number" id="incomeAmount" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 text-white font-bold" placeholder="0.00" step="0.001" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold text-slate-300 mb-2">Type *</label>
                    <select id="incomeType" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 text-slate-200 font-medium">
                        <option value="salary">💰 Salary</option>
                        <option value="bonus">🎉 Bonus</option>
                        <option value="freelance">💻 Freelance</option>
                        <option value="investment">📈 Investment</option>
                        <option value="gift">🎁 Gift</option>
                        <option value="business">🏢 Business</option>
                        <option value="commission">💵 Commission</option>

        function formatMoney(amount) {
            if (amount === undefined || amount === null) amount = 0;
            const symbol = currencies[currentCurrency]?.symbol || 'D';
            const formatted = amount.toLocaleString(undefined, { minimumFractionDigits: 3, maximumFractionDigits: 3 });
            return `${symbol} ${formatted}`;
        }
        
        function formatCompactMoney(amount) {
            if (amount >= 1000000) return (amount / 1000000).toFixed(1) + 'M';
            if (amount >= 1000) return (amount / 1000).toFixed(1) + 'K';
            return formatMoney(amount);
        }

        // ============================================

        function calculateFinancialStats() {
            // Reset all counters
            totalSalary = 0;
            totalOtherIncome = 0;
            totalExpenses = 0;
            totalLentOut = 0;
            totalDebtRecovery = 0;
            
            // Calculate from incomes collection
            incomes.forEach(inc => {
                const amount = parseFloat(inc.amount || 0);
                const type = inc.type || inc.category || 'other';
                
                if (inc.transactionType === 'income' || (!inc.transactionType && inc.amount > 0)) {
                    // Salary tracking
                    if (type === 'salary') {
                        totalSalary += amount;
                    } 
                    // Other income categories (new income)
                    else if (['bonus', 'gift', 'business', 'freelance', 'investment', 'commission', 'sidehustle', 'otherincome'].includes(type)) {
                        totalOtherIncome += amount;
                    }
                } 
                // Expense tracking from income collection
                else if (inc.transactionType === 'expense') {
                    totalExpenses += amount;
                }
                // Lent money tracking
                else if (inc.transactionType === 'lent') {
                    totalLentOut += amount;
                }
                // Debt repayment tracking (recovery)
                else if (inc.transactionType === 'debt-repayment') {
                    totalDebtRecovery += amount;
                }
            });
            
            // Get expenses from procurement purchases
            const procurementExpenses = purchasesList.reduce((sum, p) => sum + ((parseFloat(p.price) || 0) * (parseFloat(p.quantity) || 0)), 0);
            if (procurementExpenses > totalExpenses) {
                totalExpenses = procurementExpenses;
            }
            
            // Get lent amounts from debts collection (as backup)
            const debtLentAmount = debtsList.filter(d => d.type === 'lent').reduce((sum, d) => sum + (parseFloat(d.amount) || 0), 0);
            if (debtLentAmount > totalLentOut) totalLentOut = debtLentAmount;
            
            // Get recovery amounts from debts collection (as backup)
            const debtPaidAmount = debtsList.filter(d => d.type === 'lent').reduce((sum, d) => sum + (parseFloat(d.paidAmount) || 0), 0);
            if (debtPaidAmount > totalDebtRecovery) totalDebtRecovery = debtPaidAmount;
            
            // ✅ CORRECT TOTAL PAYMENT FORMULA
            // Total Payment = Salary + Other Income (only new income, not debt recovery)
            totalPayment = totalSalary + totalOtherIncome;
            
            // ✅ CORRECT CURRENT BALANCE FORMULA
            // Current Balance = Total Payment - Expenses - Lent Out + Debt Recovery
            currentBalance = totalPayment - totalExpenses - totalLentOut + totalDebtRecovery;
        }

                console.log('📊 Income query result:', snapshot.size, 'records found');
                
                incomes = snapshot.docs.map(doc => ({ 
                    id: doc.id, 
                    ...doc.data(), 
                    amount: parseFloat(doc.data().amount) || 0 
                }));
                
                incomes.sort((a, b) => {
                    if (a.createdAt && b.createdAt) return b.createdAt - a.createdAt;
                    if (a.date && b.date) return new Date(b.date) - new Date(a.date);
                    return 0;

        function renderUpcomingRepaymentsHTML() {
            const today = new Date();
            const nextWeek = new Date();
            nextWeek.setDate(today.getDate() + 7);
            
            const upcoming = debtsList.filter(d => 
                d.type === 'lent' && 
                d.dueDate && 
                new Date(d.dueDate) >= today && 
                new Date(d.dueDate) <= nextWeek &&
                (d.paidAmount || 0) < d.amount
            );
            
            if (upcoming.length === 0) {
                return '<div class="text-center text-slate-400 py-4">No upcoming repayments this week</div>';
            }
            
            return upcoming.map(d => {
                const remaining = d.amount - (d.paidAmount || 0);
                const daysUntil = Math.ceil((new Date(d.dueDate) - today) / (1000 * 60 * 60 * 24));
                return `
                    <div class="repayment-item" onclick="window.location.href='debts.html'">
                        <div>
                            <div class="font-bold text-white">${escapeHtml(d.personName)}</div>
                            <div class="text-xs text-slate-400">Due in ${daysUntil} day${daysUntil !== 1 ? 's' : ''}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-emerald-400">${formatMoney(remaining)}</div>
                            <div class="text-xs text-slate-400">Due: ${d.dueDate}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function calculateMonthlyData() {
            const last6Months = [];
            const today = new Date();
            for (let i = 5; i >= 0; i--) {
                const date = new Date(today.getFullYear(), today.getMonth() - i, 1);
                const monthName = monthNames[date.getMonth()];
                const monthIncome = incomes.filter(inc => {
                    if (!inc.date) return false;
                    if (inc.transactionType !== 'income' && inc.transactionType !== undefined) return false;
                    const incDate = new Date(inc.date);
                    return incDate.getMonth() === date.getMonth() && incDate.getFullYear() === date.getFullYear();
                }).reduce((sum, inc) => sum + (inc.amount || 0), 0);
                last6Months.push({ month: monthName, income: monthIncome, expenses: monthIncome * 0.42 });
            }
            return last6Months;
        }
        
        function calculateCategoryData() {
            const categories = {};
            incomes.forEach(inc => {
                if (inc.transactionType !== 'income' && inc.transactionType !== undefined) return;
                const type = inc.type || inc.category || 'other';
                if (!categories[type]) categories[type] = 0;
                categories[type] += inc.amount || 0;
            });
            return categories;
        }
        
        function initCharts(monthlyData, categoryData) {
            const ctxBar = document.getElementById('barChart');
            const ctxLine = document.getElementById('lineChart');
            const ctxPie = document.getElementById('pieChart');
            
            if (!ctxBar || !ctxLine || !ctxPie) return;
            
            if (charts.bar) charts.bar.destroy();
            if (charts.line) charts.line.destroy();
            if (charts.pie) charts.pie.destroy();
            
            const textColor = currentTheme === 'light' ? '#475569' : '#94a3b8';
            
            charts.bar = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: monthlyData.map(d => d.month),
                    datasets: [
                        { label: 'Income', data: monthlyData.map(d => d.income), backgroundColor: '#22C55E', borderRadius: 8 },
                        { label: 'Expenses', data: monthlyData.map(d => d.expenses), backgroundColor: '#EF4444', borderRadius: 8 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { labels: { color: textColor } }, tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${formatMoney(ctx.raw)}` } } },
                    scales: { y: { ticks: { color: textColor, callback: (v) => formatCompactMoney(v) } }, x: { ticks: { color: textColor } } }
                }
            });
            
            charts.line = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: monthlyData.map(d => d.month),
                    datasets: [{ label: 'Income Trend', data: monthlyData.map(d => d.income), borderColor: '#4F46E5', backgroundColor: 'rgba(79, 70, 229, 0.1)', tension: 0.4, fill: true }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { labels: { color: textColor } } },
                    scales: { y: { ticks: { color: textColor, callback: (v) => formatCompactMoney(v) } }, x: { ticks: { color: textColor } } }
                }
            });
            
            const categoryLabels = Object.keys(categoryData).map(l => l.charAt(0).toUpperCase() + l.slice(1));
            const categoryColors = ['#4F46E5', '#22C55E', '#F59E0B', '#EF4444', '#8B5CF6', '#06B6D4', '#EC4899', '#14B8A6'];
            
            charts.pie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: categoryLabels,
                    datasets: [{ data: Object.values(categoryData), backgroundColor: categoryColors.slice(0, categoryLabels.length), borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { color: textColor } } } }
            });
        }

        async function addIncome(event) {
            event.preventDefault();
            const amount = parseFloat(document.getElementById('incomeAmount').value);
            const type = document.getElementById('incomeType').value;
            const category = document.getElementById('incomeCategory').value;
            const date = document.getElementById('incomeDate').value || new Date().toISOString().split('T')[0];
            const description = document.getElementById('incomeDescription').value;
            
            if (!amount || isNaN(amount) || amount <= 0) {
                showToast('Please enter a valid amount', 'error');
                return;
            }
            
            showLoading(true);
            try {
                await db.collection('income').add({
                    userId: currentUser.uid,
                    amount: amount,
                    type: type,
                    category: category || type,
                    date: date,
                    description: description,
                    transactionType: 'income',
                    createdBy: userData?.fullName || currentUser.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showToast('Income added successfully!', 'success');
                closeModal('addIncomeModal');
                document.getElementById('addIncomeForm').reset();
                await loadAllData();
                
            } catch (error) {
                console.error('Error adding income:', error);
                showToast('Error adding income: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

                        document.querySelectorAll('.nav-text').forEach(el => el.style.display = 'none');
                        document.getElementById('sidebarLogoArea').style.display = 'none';
                        toggleBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
                    } else {
                        sidebar.classList.remove('sidebar-collapsed');
                        sidebar.classList.add('sidebar-expanded');
                        mainContent.style.marginLeft = '290px';
                        document.querySelectorAll('.nav-text').forEach(el => el.style.display = 'inline');
                        document.getElementById('sidebarLogoArea').style.display = 'block';
                        toggleBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
                    }
                });
            }
            
            // Mobile menu
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const mobileSidebar = document.getElementById('mobileSidebar');
            const mobileOverlay = document.getElementById('mobileMenuOverlay');
            
            if (mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileSidebar.style.transform = 'translateX(0)';
                    mobileOverlay.classList.remove('hidden');
                });
            }
            
            window.closeMobileMenu = () => {
                mobileSidebar.style.transform = 'translateX(-100%)';
                mobileOverlay.classList.add('hidden');
            };
            
            if (mobileOverlay) mobileOverlay.addEventListener('click', closeMobileMenu);
            
            // User dropdown
            const userMenuBtn = document.getElementById('userMenuBtn');
            const userDropdown = document.getElementById('userDropdown');
            if (userMenuBtn) {
                userMenuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    userDropdown.classList.toggle('hidden');
                });
            }
            
            document.addEventListener('click', () => {
                if (userDropdown) userDropdown.classList.add('hidden');
            });
            
            // Theme toggle
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', async () => {
                    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    if (currentTheme === 'light') {
                        document.body.classList.add('light-mode');
                        themeToggle.innerHTML = '<i class="fas fa-sun text-lg"></i>';
                    } else {
                        document.body.classList.remove('light-mode');
                        themeToggle.innerHTML = '<i class="fas fa-moon text-lg"></i>';
                    }
                    if (currentUser) {
                        await db.collection('users').doc(currentUser.uid).update({
                            'settings.theme': currentTheme
                        });
                    }
                    showToast(`Switched to ${currentTheme} mode`, 'success');
                    if (document.getElementById('actualContent').style.display !== 'none') {
                        renderDashboard();
                    }
                });
            }
            
            // Floating add button
            const floatingBtn = document.getElementById('floatingAddBtn');
            if (floatingBtn) floatingBtn.addEventListener('click', () => openModal('addIncomeModal'));
            
            // Logout
            const logoutBtns = ['logoutBtnSidebar', 'logoutBtnTopbar', 'logoutBtnMobile'];
            logoutBtns.forEach(btnId => {
                const btn = document.getElementById(btnId);
                if (btn) {
                    btn.addEventListener('click', async () => {
                        showLoading(true);
                        await auth.signOut();
                        window.location.href = 'auth.html';
                    });
                }
            });
            
            // Command palette (Ctrl+K)
            const commandPalette = document.getElementById('commandPalette');
            const commandInput = document.getElementById('commandInput');
            const commandResults = document.getElementById('commandResults');
            
            const commands = [
                { name: 'Add Income', action: () => openModal('addIncomeModal'), icon: 'fa-plus-circle' },
                { name: 'Go to Income', action: () => window.location.href = 'income.html', icon: 'fa-money-bill-wave' },
                { name: 'Go to Debts', action: () => window.location.href = 'debts.html', icon: 'fa-hand-holding-usd' },
                { name: 'Go to Procurement', action: () => window.location.href = 'procurement.html', icon: 'fa-shopping-cart' },
                { name: 'Go to Reports', action: () => window.location.href = 'reports.html', icon: 'fa-chart-pie' },
                { name: 'Go to Settings', action: () => window.location.href = 'settings.html', icon: 'fa-cog' },
                { name: 'Go to Admin', action: () => window.location.href = 'administration.html', icon: 'fa-user-shield' },
                { name: 'Refresh Dashboard', action: () => loadAllData(), icon: 'fa-sync-alt' }
            ];
            
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    commandPalette.classList.toggle('hidden');
                    if (!commandPalette.classList.contains('hidden')) {
                        setTimeout(() => commandInput?.focus(), 100);
                    }
                }
                if (e.key === 'Escape') {
                    commandPalette.classList.add('hidden');
                    closeModal('addIncomeModal');
                }
            });
            
            if (commandInput) {
                commandInput.addEventListener('input', () => {
                    const query = commandInput.value.toLowerCase();
                    const filtered = commands.filter(cmd => cmd.name.toLowerCase().includes(query));
                    commandResults.innerHTML = filtered.map(cmd => `
                        <div class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-indigo-500/10 cursor-pointer transition font-medium" onclick="(${cmd.action.toString()})(); document.getElementById('commandPalette').classList.add('hidden');">
                            <i class="fas ${cmd.icon} text-indigo-400 w-5"></i>
                            <span>${cmd.name}</span>
                        </div>
                    `).join('');
                });
                commandResults.innerHTML = commands.map(cmd => `
                    <div class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-indigo-500/10 cursor-pointer transition font-medium" onclick="(${cmd.action.toString()})(); document.getElementById('commandPalette').classList.add('hidden');">
                        <i class="fas ${cmd.icon} text-indigo-400 w-5"></i>
                        <span>${cmd.name}</span>
                    </div>
                `).join('');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Make functions global
        window.openModal = openModal;
        window.closeModal = closeModal;
    </script>
</body>
</html>
