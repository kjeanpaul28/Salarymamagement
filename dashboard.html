<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAYE Dashboard | Financial Management System</title>

    <link rel="icon" type="image/png" href="https://ik.imagekit.io/73qho7kh9/file_000000003e9471f88734aae4d52e7513%20(1).png">
    
    <!-- Tailwind CSS - Development only -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            transition: background 0.3s ease;
        }
        
        body.light-mode {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
        }
        
        /* Sidebar Premium */
        .sidebar-premium {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(79, 70, 229, 0.2);
            box-shadow: 4px 0 25px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        body.light-mode .sidebar-premium {
            background: rgba(255, 255, 255, 0.95);
        }
        
        .sidebar {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sidebar-collapsed { width: 88px; }
        .sidebar-expanded { width: 290px; }
        
        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            margin: 6px 12px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            cursor: pointer;
            color: #94a3b8;
        }
        
        body.light-mode .sidebar-nav-item { color: #475569; }
        
        .sidebar-nav-item i { width: 24px; font-size: 1.2rem; }
        
        .sidebar-nav-item:hover {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.15), rgba(79, 70, 229, 0.05));
            color: #e2e8f0;
            transform: translateX(5px);
        }
        
        .sidebar-nav-item.active {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.25), rgba(79, 70, 229, 0.1));
            color: #818cf8;
            border-left: 3px solid #4F46E5;
        }
        
        /* Topbar */
        .topbar-premium {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(79, 70, 229, 0.2);
            transition: all 0.3s ease;
        }
        
        body.light-mode .topbar-premium {
            background: rgba(255, 255, 255, 0.85);
        }
        
        .search-input {
            background: rgba(51, 65, 85, 0.6);
            border: 1px solid rgba(79, 70, 229, 0.3);
            border-radius: 60px;
            transition: all 0.25s ease;
        }
        
        .user-btn {
            background: rgba(51, 65, 85, 0.6);
            border: 1px solid rgba(79, 70, 229, 0.3);
            border-radius: 60px;
            transition: all 0.25s ease;
        }
        
        .user-btn:hover {
            border-color: #4F46E5;
            background: rgba(79, 70, 229, 0.15);
        }
        
        /* Glass Card */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 70, 229, 0.2);
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        
        body.light-mode .glass-card {
            background: rgba(255, 255, 255, 0.7);
        }
        
        .glass-card:hover {
            border-color: rgba(79, 70, 229, 0.5);
        }
        
        /* KPI Cards */
        .kpi-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(30, 41, 59, 0.7));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 70, 229, 0.25);
            border-radius: 28px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .kpi-card:hover {
            transform: translateY(-4px);
            border-color: #4F46E5;
        }
        
        .kpi-value {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Chart Container */
        .chart-container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(79, 70, 229, 0.2);
            border-radius: 24px;
            padding: 1.25rem;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(79, 70, 229, 0.4);
            padding: 0.9rem 1.5rem;
            border-radius: 60px;
            z-index: 3000;
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
        }
        
        .toast.success { background: rgba(34, 197, 94, 0.9); }
        .toast.error { background: rgba(239, 68, 68, 0.9); }
        .toast.info { background: rgba(59, 130, 246, 0.9); }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        
        .spinner-premium {
            width: 55px;
            height: 55px;
            border: 3px solid rgba(79, 70, 229, 0.2);
            border-top-color: #4F46E5;
            border-right-color: #818cf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Activity item */
        .activity-item {
            background: rgba(51, 65, 85, 0.3);
            border-radius: 16px;
            padding: 12px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        
        .activity-item:hover {
            border-color: rgba(79, 70, 229, 0.4);
            background: rgba(79, 70, 229, 0.08);
        }
        
        /* Floating button */
        .floating-btn {
            background: linear-gradient(135deg, #4F46E5, #6366f1);
            box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.5);
            transition: all 0.25s ease;
        }
        
        .floating-btn:hover {
            transform: scale(1.1);
        }
        
        /* Health meter */
        .health-meter {
            height: 8px;
            background: rgba(51, 65, 85, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s infinite;
            border-radius: 20px;
        }
        
        @keyframes skeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Page animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .page-animation {
            animation: fadeInUp 0.5s ease-out;
        }
        
        /* Mobile menu */
        .mobile-menu-premium {
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(79, 70, 229, 0.3);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #4F46E5; border-radius: 10px; }
        
        /* Light mode text */
        body.light-mode .text-slate-200 { color: #1e293b; }
        body.light-mode .text-slate-300 { color: #334155; }
        body.light-mode .text-slate-400 { color: #64748b; }
        body.light-mode .border-slate-700 { border-color: #e2e8f0; }
        body.light-mode .bg-slate-800 { background-color: #f1f5f9; }
        body.light-mode .bg-slate-800\/50 { background-color: #f8fafc; }
        body.light-mode .bg-slate-900 { background-color: #ffffff; }
        
        @media (max-width: 768px) {
            .kpi-value { font-size: 1.5rem; }
        }
    </style>
</head>

        function formatMoney(amount) {
            if (amount === undefined || amount === null) amount = 0;
            const symbol = currencies[currentCurrency]?.symbol || 'FRw';
            if (currentCurrency === 'AED') return `${symbol} ${amount.toLocaleString()}`;
            return `${symbol} ${amount.toLocaleString()}`;
        }
        
        function formatCompactMoney(amount) {
            if (amount >= 1000000) return formatMoney(amount / 1000000) + 'M';
            if (amount >= 1000) return formatMoney(amount / 1000) + 'K';
            return formatMoney(amount);
        }
        
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            toast.innerHTML = `<i class="fas ${icons[type]}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function loadIncomes() {
            console.log('📥 Loading incomes for user:', currentUser?.uid);
            
            if (!currentUser) {
                console.error('❌ No current user');
                return;
            }
            
            showLoading(true);
            try {
                // Try with simple query first (no orderBy to avoid index requirement)
                let query = db.collection('income').where('userId', '==', currentUser.uid);
                
                const snapshot = await query.get();
                
                console.log('📊 Query result:', snapshot.size, 'records found');
                
                incomes = snapshot.docs.map(doc => ({ 
                    id: doc.id, 
                    ...doc.data(), 
                    amount: doc.data().amount || 0 
                }));
                
                // Sort manually instead of using orderBy
                incomes.sort((a, b) => {
                    if (a.timestamp && b.timestamp) {
                        return b.timestamp - a.timestamp;
                    }
                    return 0;
                });
                
                console.log('💰 Processed incomes:', incomes.length);
                
                if (incomes.length === 0) {
                    console.warn('⚠️ No income records found');
                    showToast('No income data. Click + to add your first income!', 'info');
                } else {
                    const total = incomes.reduce((sum, inc) => sum + inc.amount, 0);
                    console.log('💰 Total income:', total);
                }
                
                hideSkeletonAndRender();
                
            } catch (error) {
                console.error('❌ Error loading incomes:', error);
                console.error('Error details:', error.message);
                
                if (error.code === 'failed-precondition' && error.message.includes('index')) {
                    console.warn('⚠️ Index required! Creating fallback query...');
                    // Fallback: try without any ordering
                    try {
                        const fallbackSnapshot = await db.collection('income').where('userId', '==', currentUser.uid).get();
                        incomes = fallbackSnapshot.docs.map(doc => ({ 
                            id: doc.id, 
                            ...doc.data(), 
                            amount: doc.data().amount || 0 
                        }));
                        console.log('📊 Fallback query successful:', incomes.length, 'records');
                        hideSkeletonAndRender();
                    } catch (fallbackError) {
                        console.error('❌ Fallback also failed:', fallbackError);
                        showToast('Please create required index. Check console for link.', 'error');
                        hideSkeletonAndRender();
                    }
                } else {
                    showToast('Error loading data: ' + error.message, 'error');
                    hideSkeletonAndRender();
                }
            } finally {
                showLoading(false);
            }
        }

        function calculateMonthlyData() {
            const last6Months = [];
            const today = new Date();
            for (let i = 5; i >= 0; i--) {
                const date = new Date(today.getFullYear(), today.getMonth() - i, 1);
                const monthName = monthNames[date.getMonth()];
                const monthIncome = incomes.filter(inc => {
                    if (!inc.date) return false;
                    const incDate = new Date(inc.date);
                    return incDate.getMonth() === date.getMonth() && incDate.getFullYear() === date.getFullYear();
                }).reduce((sum, inc) => sum + (inc.amount || 0), 0);
                last6Months.push({ month: monthName, income: monthIncome, expenses: monthIncome * 0.42 });
            }
            return last6Months;
        }
        
        function calculateCategoryData() {
            const categories = {};
            incomes.forEach(inc => {
                const type = inc.type || 'other';
                if (!categories[type]) categories[type] = 0;
                categories[type] += inc.amount || 0;
            });
            return categories;
        }
        
        function initCharts(monthlyData, categoryData) {

            const ctxLine = document.getElementById('lineChart');

            if (charts.bar) charts.bar.destroy();

            if (charts.pie) charts.pie.destroy();
            
            const textColor = currentTheme === 'light' ? '#475569' : '#94a3b8';
            
            charts.bar = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: monthlyData.map(d => d.month),

                        { label: 'Expenses', data: monthlyData.map(d => d.expenses), backgroundColor: '#EF4444', borderRadius: 8 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { labels: { color: textColor } }, tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${formatMoney(ctx.raw)}` } } },
                    scales: { y: { ticks: { color: textColor, callback: (v) => formatCompactMoney(v) } }, x: { ticks: { color: textColor } } }
                }
            });
            
            charts.line = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: monthlyData.map(d => d.month),
                    datasets: [{ label: 'Income Trend', data: monthlyData.map(d => d.income), borderColor: '#4F46E5', backgroundColor: 'rgba(79, 70, 229, 0.1)', tension: 0.4, fill: true }]
                },

                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { labels: { color: textColor } } },
                    scales: { y: { ticks: { color: textColor, callback: (v) => formatCompactMoney(v) } }, x: { ticks: { color: textColor } } }
                }
            });
            
            charts.pie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categoryData).map(l => l.charAt(0).toUpperCase() + l.slice(1)),

                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { color: textColor } } } }
            });
        }

            else if (savingsRate >= 20) { status = 'Good'; color = '#F59E0B'; message = 'You\'re on the right track!'; }
            else if (savingsRate >= 10) { status = 'Fair'; color = '#3B82F6'; message = 'Room for improvement.'; }

        function renderAIInsights(totalIncome, totalExpenses, netBalance, savingsRate) {
            const insights = [];
            if (totalIncome === 0) {
                insights.push('📌 <span class="text-yellow-400 font-bold">No income recorded yet.</span> Start by adding your first income entry!');
            } else {
                if (savingsRate < 15) insights.push('💰 <span class="text-yellow-400 font-bold">Savings Alert:</span> Your savings rate is below 15%. Try to save at least 20% of your income.');
                else if (savingsRate > 30) insights.push('🎯 <span class="text-green-400 font-bold">Excellent!</span> You\'re saving over 30% of your income.');
                if (totalExpenses > totalIncome * 0.5) insights.push('📊 <span class="text-orange-400 font-bold">Expense Analysis:</span> Your expenses are high (over 50% of income).');
                const topCategory = Object.entries(calculateCategoryData()).sort((a, b) => b[1] - a[1])[0];
                if (topCategory) insights.push(`🎯 <span class="text-blue-400 font-bold">Top Income Source:</span> ${topCategory[0]}`);
            }
            if (insights.length === 0) insights.push('✨ <span class="text-green-400 font-bold">Great job!</span> Your finances look healthy.');
            
            document.getElementById('aiInsights').innerHTML = insights.map(i => `
                <div class="flex items-start gap-3 p-3 bg-slate-800/40 rounded-xl">
                    <div class="text-xl">${i.split(' ')[0]}</div>
                    <div class="font-medium">${i.substring(i.indexOf(' ') + 1)}</div>
                </div>
            `).join('');
        }
        
        function renderActivityFeed() {
            const recentIncomes = incomes.slice(0, 8);
            if (recentIncomes.length === 0) {
                document.getElementById('activityFeed').innerHTML = `
                    <div class="text-center text-slate-400 py-8">
                        <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                        <p class="font-medium">No income records yet</p>
                        <button onclick="openModal('addIncomeModal')" class="mt-3 text-indigo-400 text-sm font-bold hover:underline">Add your first income →</button>
                    </div>
                `;
                return;
            }
            
            document.getElementById('activityFeed').innerHTML = recentIncomes.map(inc => `
                <div class="activity-item flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-green-500/20 rounded-xl flex items-center justify-center">
                            <i class="fas fa-plus-circle text-green-400"></i>
                        </div>
                        <div>
                            <div class="font-bold">${inc.type ? inc.type.charAt(0).toUpperCase() + inc.type.slice(1) : 'Income'}</div>
                            <div class="text-xs text-slate-400 font-medium">${inc.date || new Date().toISOString().split('T')[0]}</div>
                        </div>
                    </div>
                    <div class="font-extrabold text-green-400">+${formatMoney(inc.amount)}</div>
                </div>
            `).join('');
        }
        
        // ============================================
        // SIDEBAR RENDER
        // ============================================
        
        function renderSidebar() {
            const desktopNav = document.getElementById('sidebarNav');
            const mobileNav = document.getElementById('mobileSidebarNav');
            
            const navHtml = navItems.map(item => `
                <div class="sidebar-nav-item ${item.active ? 'active' : ''}" onclick="window.location.href='${item.page}'">
                    <i class="fas ${item.icon}"></i>
                    <span class="nav-text font-semibold">${item.text}</span>
                </div>
            `).join('');
            
            if (desktopNav) desktopNav.innerHTML = navHtml;
            if (mobileNav) mobileNav.innerHTML = navHtml;
        }
        
        // ============================================
        // ADD INCOME
        // ============================================
        
        async function addIncome(event) {
            event.preventDefault();
            const amount = parseFloat(document.getElementById('incomeAmount').value);
            const type = document.getElementById('incomeType').value;
            const category = document.getElementById('incomeCategory').value;
            const date = document.getElementById('incomeDate').value || new Date().toISOString().split('T')[0];
            const description = document.getElementById('incomeDescription').value;
            
            if (!amount || isNaN(amount) || amount <= 0) {
                showToast('Please enter a valid amount', 'error');
                return;
            }
            
            showLoading(true);
            try {
                await db.collection('income').add({
                    userId: currentUser.uid,
                    amount: amount,
                    type: type,
                    category: category || type,
                    date: date,
                    description: description,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showToast('Income added successfully!', 'success');
                closeModal('addIncomeModal');
                document.getElementById('addIncomeForm').reset();
                await loadIncomes();
                
            } catch (error) {
                console.error('Error adding income:', error);
                showToast('Error adding income: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // ============================================
        // EVENT LISTENERS
        // ============================================
        
        function setupEventListeners() {
            document.getElementById('addIncomeForm').addEventListener('submit', addIncome);
            
            // Toggle sidebar
            let isCollapsed = false;
            const toggleBtn = document.getElementById('toggleSidebarBtn');
            const sidebar = document.getElementById('desktopSidebar');
            const mainContent = document.getElementById('mainContent');
            
            if (toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    isCollapsed = !isCollapsed;
                    if (isCollapsed) {
                        sidebar.classList.add('sidebar-collapsed');
                        sidebar.classList.remove('sidebar-expanded');
                        mainContent.style.marginLeft = '88px';
                        document.querySelectorAll('.nav-text').forEach(el => el.style.display = 'none');
                        document.getElementById('sidebarLogoArea').style.display = 'none';
                        toggleBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
                    } else {
                        sidebar.classList.remove('sidebar-collapsed');
                        sidebar.classList.add('sidebar-expanded');
                        mainContent.style.marginLeft = '290px';
                        document.querySelectorAll('.nav-text').forEach(el => el.style.display = 'inline');
                        document.getElementById('sidebarLogoArea').style.display = 'block';
                        toggleBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
                    }
                });
            }
            
            // Mobile menu
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const mobileSidebar = document.getElementById('mobileSidebar');
            const mobileOverlay = document.getElementById('mobileMenuOverlay');
            
            if (mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileSidebar.style.transform = 'translateX(0)';
                    mobileOverlay.classList.remove('hidden');
                });
            }
            
            window.closeMobileMenu = () => {
                mobileSidebar.style.transform = 'translateX(-100%)';
                mobileOverlay.classList.add('hidden');
            };
            
            if (mobileOverlay) mobileOverlay.addEventListener('click', closeMobileMenu);
            
            // User dropdown
            const userMenuBtn = document.getElementById('userMenuBtn');
            const userDropdown = document.getElementById('userDropdown');
            if (userMenuBtn) {
                userMenuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    userDropdown.classList.toggle('hidden');
                });
            }
            
            document.addEventListener('click', () => {
                if (userDropdown) userDropdown.classList.add('hidden');
            });
            
            // Theme toggle
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', async () => {
                    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    if (currentTheme === 'light') {
                        document.body.classList.add('light-mode');
                        themeToggle.innerHTML = '<i class="fas fa-sun text-lg"></i>';
                    } else {
                        document.body.classList.remove('light-mode');
                        themeToggle.innerHTML = '<i class="fas fa-moon text-lg"></i>';
                    }
                    if (currentUser) {
                        await db.collection('users').doc(currentUser.uid).update({
                            'settings.theme': currentTheme
                        });
                    }
                    showToast(`Switched to ${currentTheme} mode`, 'success');
                });
            }
            
            // Floating add button
            const floatingBtn = document.getElementById('floatingAddBtn');
            if (floatingBtn) floatingBtn.addEventListener('click', () => openModal('addIncomeModal'));
            
            // Refresh activity
            const refreshBtn = document.getElementById('refreshActivityBtn');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', async () => {
                    showToast('Refreshing data...', 'info');
                    await loadIncomes();
                    showToast('Data refreshed', 'success');
                });
            }
            
            // Logout
            const logoutBtns = ['logoutBtnSidebar', 'logoutBtnTopbar', 'logoutBtnMobile'];
            logoutBtns.forEach(btnId => {
                const btn = document.getElementById(btnId);
                if (btn) {
                    btn.addEventListener('click', async () => {
                        showLoading(true);
                        await auth.signOut();
                        window.location.href = 'index.html';
                    });
                }
            });
            
            // Command palette (Ctrl+K)
            const commandPalette = document.getElementById('commandPalette');
            const commandInput = document.getElementById('commandInput');
            const commandResults = document.getElementById('commandResults');
            
            const commands = [
                { name: 'Add Income', action: () => openModal('addIncomeModal'), icon: 'fa-plus-circle' },
                { name: 'Go to Income', action: () => window.location.href = 'income.html', icon: 'fa-money-bill-wave' },
                { name: 'Go to Reports', action: () => window.location.href = 'reports.html', icon: 'fa-chart-pie' },
                { name: 'Go to Settings', action: () => window.location.href = 'settings.html', icon: 'fa-cog' },
                { name: 'Refresh Dashboard', action: () => loadIncomes(), icon: 'fa-sync-alt' }
            ];
            
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    commandPalette.classList.toggle('hidden');
                    if (!commandPalette.classList.contains('hidden')) {
                        setTimeout(() => commandInput?.focus(), 100);
                    }
                }
                if (e.key === 'Escape') {
                    commandPalette.classList.add('hidden');
                    closeModal('addIncomeModal');
                }
            });
            
            if (commandInput) {
                commandInput.addEventListener('input', () => {
                    const query = commandInput.value.toLowerCase();
                    const filtered = commands.filter(cmd => cmd.name.toLowerCase().includes(query));
                    commandResults.innerHTML = filtered.map(cmd => `
                        <div class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-indigo-500/10 cursor-pointer transition font-medium" onclick="(${cmd.action.toString()})(); document.getElementById('commandPalette').classList.add('hidden');">
                            <i class="fas ${cmd.icon} text-indigo-400 w-5"></i>
                            <span>${cmd.name}</span>
                        </div>
                    `).join('');
                });
                commandResults.innerHTML = commands.map(cmd => `
                    <div class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-indigo-500/10 cursor-pointer transition font-medium" onclick="(${cmd.action.toString()})(); document.getElementById('commandPalette').classList.add('hidden');">
                        <i class="fas ${cmd.icon} text-indigo-400 w-5"></i>
                        <span>${cmd.name}</span>
                    </div>
                `).join('');
            }
        }
        
        // Make functions global
        window.openModal = openModal;
        window.closeModal = closeModal;
    </script>
</body>
</html>
